name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'  # rebuild every 30 minutes to pick up Notion changes

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
