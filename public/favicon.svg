<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#C4892A"/>

  <!-- Dog body -->
  <ellipse cx="32" cy="46" rx="15" ry="9" fill="#8B5E2A"/>

  <!-- Dog head -->
  <circle cx="32" cy="30" r="11" fill="#8B5E2A"/>

  <!-- Left ear floppy -->
  <ellipse cx="22" cy="26" rx="5" ry="8" fill="#6B4520" transform="rotate(-20 22 26)"/>

  <!-- Right ear floppy -->
  <ellipse cx="42" cy="26" rx="5" ry="8" fill="#6B4520" transform="rotate(20 42 26)"/>

  <!-- Snout -->
  <ellipse cx="32" cy="34" rx="6" ry="4" fill="#A0703A"/>

  <!-- Nose -->
  <ellipse cx="32" cy="32" rx="3" ry="2" fill="#1E1208"/>

  <!-- Eyes (happy squint) -->
  <path d="M26 27 Q28 25 30 27" stroke="#1E1208" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M34 27 Q36 25 38 27" stroke="#1E1208" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="32" cy="37" rx="2.5" ry="3" fill="#E05A6A"/>

  <!-- Tail -->
  <path d="M47 44 Q56 34 53 24" stroke="#8B5E2A" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Petting hand (medium-light skin) from top -->
  <rect x="25" y="8" width="14" height="10" rx="5" fill="#FDBCB4"/>
  <rect x="24" y="6" width="4" height="8" rx="2" fill="#FDBCB4"/>
  <rect x="29" y="4" width="4" height="9" rx="2" fill="#FDBCB4"/>
  <rect x="34" y="5" width="4" height="8" rx="2" fill="#FDBCB4"/>
</svg>
